<!DOCTYPE html>
<html>
<head>
  <title>CDP WebSDK Test</title>
</head>
<body>
  <h1>CDP WebSDK Test</h1>

  <p id="status">Loading...</p>

  <button id="testButton">Download Informatie Tankbier 2</button>

  <script src="https://cdns.cdp.gigya.com/websdk.js"></script>

  <script>
    window.CDP = null;

    gigya.cdp.init({
      apiDomain: 'EU5',
      bUnitId: '4_woi4pL5Y739AdAXkoseydw',
      appId: 'HCTCnZv4F3uIlnwfRtwohg'
    })
    .then(function(sdk) {
      window.CDP = sdk;
      document.getElementById('status').innerText = 'Success: CDP SDK loaded';
      console.log('CDP SDK loaded:', sdk);
    })
    .catch(function(error) {
      document.getElementById('status').innerText = 'Error: check browser console';
      console.error('CDP SDK error:', error);
    });

    document.getElementById('testButton').addEventListener('click', function() {
      if (!window.CDP) {
        document.getElementById('status').innerText = 'CDP SDK is not available yet';
        console.warn('Button clicked, but CDP SDK is not available yet.');
        return;
      }

      try {
        window.CDP.report('Web Client Tracking', {
          "eventId": "evt-" + Math.floor(Math.random() * 1000000),
          "os": "Windows 11",
          "cdpid": "000000000744266017:WfpRYvh6stBEQZeZK32CSC3ZvvOLkHRL",
          "type": "Download",
          "detail": "Informatie Tankbier"
        });

        document.getElementById('status').innerText = 'Tracking event sent';
        console.log('Tracking event sent to CDP');
        document.getElementById('testButton').innerText = 'Download complete';
        document.getElementById('testButton').disabled = true;
      } catch (error) {
        document.getElementById('status').innerText = 'Error while sending tracking event';
        console.error('Error while sending tracking event:', error);
      }
    });
  </script>
</body>
</html>
